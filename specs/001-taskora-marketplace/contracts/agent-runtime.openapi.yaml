openapi: 3.1.0
info:
  title: Taskora Agent Runtime API
  version: 0.1.0
  description: Runtime service endpoints for long-running workforce execution and diagnostics.
servers:
  - url: https://runtime.taskora.example.com
security:
  - runtimeAuth: []
paths:
  /runtime/jobs/{jobId}/run:
    post:
      summary: Start or resume execution for a selected job
      operationId: runJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunJobRequest'
      responses:
        '202':
          description: Execution accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeJobStatus'
  /runtime/jobs/{jobId}/status:
    get:
      summary: Read runtime execution status for a job
      operationId: getRuntimeJobStatus
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Runtime status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeJobStatus'
        '404':
          $ref: '#/components/responses/NotFound'
  /runtime/workforces/{workforceId}/test:
    post:
      summary: Validate or smoke-test a workforce manifest and connectivity
      operationId: testWorkforce
      parameters:
        - $ref: '#/components/parameters/WorkforceId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                includeCompatibilityCheck:
                  type: boolean
      responses:
        '200':
          description: Workforce test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkforceTestResult'
  /runtime/health:
    get:
      summary: Runtime health check
      operationId: getRuntimeHealth
      security: []
      responses:
        '200':
          description: Runtime health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
                  adapters:
                    type: object
components:
  securitySchemes:
    runtimeAuth:
      type: apiKey
      in: header
      name: x-taskora-runtime-secret
  parameters:
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkforceId:
      name: workforceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    RunJobRequest:
      type: object
      required:
        - workforceId
      properties:
        workforceId:
          type: string
          format: uuid
        triggerSource:
          type: string
          enum: [control_plane, retry, manual]
        idempotencyKey:
          type: string
    RuntimeJobStatus:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        workforceId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, awaiting_approval, completed, rejected, failed]
        currentRole:
          type: string
        traceEventCount:
          type: integer
        finalResultReference:
          type: string
        ogTraceReference:
          type: string
        settlementReference:
          type: string
        executionReference:
          type: string
    WorkforceTestResult:
      type: object
      properties:
        workforceId:
          type: string
          format: uuid
        compatible:
          type: boolean
        deploymentMode:
          type: string
        checks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
              detail:
                type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
